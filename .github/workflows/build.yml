name: Build and Publish Patch

on:
  push:
    branches: [ "**" ] 
    tags: [ "v*" ]    
  pull_request:
    branches: [ "**" ]
  # --- MANUAL TRIGGER ---
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual trigger'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # Uploads the jar to the Actions tab (Summary page)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: manyideas-core-patch-jar
          path: build/libs/*.jar

      # --- GITHUB RELEASE ---
      # This runs if you push a tag OR if you run it manually
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # If run manually on a branch, it uses the branch name as the tag
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}