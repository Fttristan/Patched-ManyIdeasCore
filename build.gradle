sourceSets {
    dummy {
        java {
            srcDir 'src/dummy/java'
        }
    }
    // Tell the main code that it can "see" the dummy classes while compiling
    main {
        compileClasspath += dummy.output
    }
}

// Make sure dependencies for dummies are resolved
configurations {
    dummyCompileClasspath.extendsFrom(compileClasspath)
}

// THIS IS THE CRITICAL PART:
// This tells the JAR task to only include your Mixin/Main code
// and EXCLUDE the dummy classes we created for the API.
tasks.named('jar', Jar).configure {
    // Exclude the package that causes the "ResolutionException"
    exclude 'de/geheimagentnr1/minecraft_forge_api/**'

    manifest {
        attributes([
            "MixinConfigs": "manyideas_patch.mixin.json"
        ])
    }
    finalizedBy 'reobfJar'
}