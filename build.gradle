plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = '1.0.0'
group = 'de.geheimagentnr1.manyideas_core.patch'

base {
    archivesName = 'ManyIdeasCore-ServerPatch'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: '1.20.1'
    copyIdeResources = true
}

// Tell Gradle to look in the /libs folder
repositories {
    flatDir {
        dir 'libs'
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.2.23'

    // Reference your specific JAR file
    // Format is "group:name:version" -> "blank:ManyIdeasCore-1.20.1:1.4.2"
    implementation fg.deobf("blank:ManyIdeasCore-1.20.1:1.4.2")

    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

mixin {
    add sourceSets.main, "manyideas_patch.refmap.json"
    config "manyideas_patch.mixin.json"
}

tasks.named('jar', Jar).configure {
    finalizedBy 'reobfJar'
}